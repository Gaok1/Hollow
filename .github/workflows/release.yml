name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      should_release: ${{ steps.extract.outputs.should_release }}
    steps:
      - name: Extract version from commit message
        id: extract
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Found version: $VERSION"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No version tag in commit message, skipping release."
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: Hollow
            asset_name: Hollow-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: Hollow.exe
            asset_name: Hollow-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release
          cp artifacts/Hollow-linux-x86_64/Hollow        release/Hollow-linux-x86_64
          cp artifacts/Hollow-windows-x86_64.exe/Hollow.exe release/Hollow-windows-x86_64.exe
          chmod +x release/Hollow-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: ${{ needs.check-version.outputs.version }}
          body: |
            ## Hollow ${{ needs.check-version.outputs.version }}

            **Downloads:**
            - `Hollow-linux-x86_64` — Linux x86_64
            - `Hollow-windows-x86_64.exe` — Windows x86_64

            **Commit:** ${{ github.event.head_commit.message }}
          files: |
            release/Hollow-linux-x86_64
            release/Hollow-windows-x86_64.exe
          fail_on_unmatched_files: true
